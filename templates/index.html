{{define "content"}}

<!-- Live search -->
<div style="margin-bottom:2.5rem;">
    <div style="position:relative;">
        <input
            type="text"
            name="q"
            placeholder="Search posts…"
            class="field"
            style="padding-left:2.5rem; font-size:0.95rem;"
            hx-get="/search"
            hx-target="#search-results"
            hx-trigger="keyup changed delay:300ms"
            hx-indicator="#search-spinner"
            autocomplete="off"
        >
        <svg style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%);
                    width:16px; height:16px; color:var(--ink-muted);"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <span id="search-spinner" class="htmx-indicator"
              style="position:absolute; right:0.8rem; top:50%; transform:translateY(-50%);
                     font-family:'JetBrains Mono',monospace; font-size:0.65rem;
                     color:var(--ink-muted); letter-spacing:0.1em;">
            searching…
        </span>
    </div>
    <div id="search-results" style="margin-top:0.5rem;"></div>
</div>

<div class="section-rule">Latest Posts</div>

{{if .Data.Posts}}
    <div id="post-list">
        {{template "post_list.html" .Data}}
    </div>
{{else}}
    <div style="text-align:center; padding:5rem 0; color:var(--ink-muted);">
        <svg style="width:48px; height:48px; margin:0 auto 1.5rem; display:block; opacity:0.3;"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                  d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <p style="font-family:'JetBrains Mono',monospace; font-size:0.8rem;
                  letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1.5rem;">
            No posts published yet
        </p>
        {{if $.User}}
        <a href="/new" class="btn-primary">Write the first post</a>
        {{end}}
    </div>
{{end}}

{{end}}
