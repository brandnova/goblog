{{define "content"}}

<div style="margin-bottom: 2.5rem;">
    <div class="section-rule">Reading List</div>
    <h1 style="font-family:'Playfair Display',serif; font-size:2rem;
               font-weight:900; margin:0;">
        Your Bookmarks
    </h1>
</div>

{{if .Data}}
    <div style="display:flex; flex-direction:column;">
        {{range .Data}}
        <article class="post-card rounded-lg" style="padding:1.5rem 0; border-bottom:1px solid var(--rule);">
            <h2 style="font-family:'Playfair Display',serif; font-size:1.4rem;
                       font-weight:700; margin:0 0 0.4rem;">
                <a href="/u/{{.AuthorName}}/{{.Slug}}"
                   style="color:var(--ink); text-decoration:none;"
                   onmouseover="this.style.color='var(--accent)'"
                   onmouseout="this.style.color='var(--ink)'">
                    {{.Title}}
                </a>
            </h2>
            <p style="color:var(--ink-soft); font-size:0.95rem; line-height:1.6;
                      margin:0 0 0.6rem;">
                {{.Excerpt}}
            </p>
            <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                <a href="/u/{{.AuthorName}}"
                   style="font-family:'JetBrains Mono',monospace; font-size:0.7rem;
                          color:var(--ink-muted); text-decoration:none;"
                   onmouseover="this.style.color='var(--accent)'"
                   onmouseout="this.style.color='var(--ink-muted)'">
                    {{.AuthorName}}
                </a>
                <span style="color:var(--rule);">·</span>
                <span style="font-family:'JetBrains Mono',monospace; font-size:0.7rem;
                             color:var(--ink-muted);">
                    {{.CreatedAt.Format "Jan 2, 2006"}}
                </span>
                <span style="color:var(--rule);">·</span>
                <span style="font-family:'JetBrains Mono',monospace; font-size:0.7rem;
                             color:var(--ink-muted);">
                    {{.ReadTime}} min read
                </span>
            </div>
        </article>
        {{end}}
    </div>
{{else}}
    <div style="text-align:center; padding:5rem 0; color:var(--ink-muted);">
        <p style="font-family:'JetBrains Mono',monospace; font-size:0.8rem;
                  letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1.5rem;">
            No bookmarks yet.
        </p>
        <a href="/" class="btn-ghost">Browse posts</a>
    </div>
{{end}}

{{end}}
