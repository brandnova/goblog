<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoBlog</title>

    <!-- Google Fonts: Playfair Display for headings, Source Serif 4 for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Local compiled Tailwind -->
    <link rel="stylesheet" href="/static/css/tailwind.css">

    <style>
        :root {
            --ink:       #1a1a18;
            --ink-soft:  #4a4a45;
            --ink-muted: #8a8a82;
            --paper:     #faf9f6;
            --paper-alt: #f2f0eb;
            --rule:      #e0ddd6;
            --accent:    #c8402a;
            --accent-alt:#2a6e5e;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 18px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', Georgia, serif;
            line-height: 1.2;
        }

        code, pre, .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Thin horizontal rule with label — used throughout */
        .section-rule {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--ink-muted);
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        .section-rule::before,
        .section-rule::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--rule);
        }
        .section-rule::before { display: none; }

        /* Masthead rule line */
        .masthead-rule {
            border: none;
            border-top: 3px solid var(--ink);
            margin: 0;
        }
        .masthead-subrule {
            border: none;
            border-top: 1px solid var(--ink);
            margin: 0;
        }

        /* Post card hover lift */
        .post-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        /* Tag pill */
        .tag-pill {
            display: inline-block;
            padding: 2px 10px;
            border: 1px solid var(--rule);
            border-radius: 2px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.08em;
            text-transform: lowercase;
            color: var(--ink-soft);
            text-decoration: none;
            transition: border-color 0.1s, color 0.1s;
        }
        .tag-pill:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Status badge */
        .badge-draft {
            background: #fef9c3;
            color: #854d0e;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            padding: 2px 8px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .badge-published {
            background: #dcfce7;
            color: #166534;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            padding: 2px 8px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Form inputs */
        .field {
            width: 100%;
            background: white;
            border: 1px solid var(--rule);
            border-radius: 2px;
            padding: 0.65rem 0.85rem;
            font-family: 'Source Serif 4', serif;
            font-size: 1rem;
            color: var(--ink);
            transition: border-color 0.15s;
            outline: none;
        }
        .field:focus {
            border-color: var(--ink);
        }
        .field::placeholder {
            color: var(--ink-muted);
        }

        /* Primary button */
        .btn-primary {
            background: var(--ink);
            color: var(--paper);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.7rem 1.8rem;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary:hover {
            background: var(--accent);
        }

        /* Ghost button */
        .btn-ghost {
            background: transparent;
            color: var(--ink);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.6rem 1.4rem;
            border: 1px solid var(--rule);
            border-radius: 2px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-ghost:hover {
            border-color: var(--ink);
        }

        /* Danger button */
        .btn-danger {
            background: transparent;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.6rem 1.4rem;
            border: 1px solid #e8d0cc;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-danger:hover {
            background: var(--accent);
            color: white;
        }

        /* Alert / error banner */
        .alert-error {
            background: #fef2f2;
            border-left: 3px solid var(--accent);
            padding: 0.85rem 1rem;
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }
        .alert-success {
            background: #f0fdf4;
            border-left: 3px solid var(--accent-alt);
            padding: 0.85rem 1rem;
            font-size: 0.9rem;
            color: var(--accent-alt);
            margin-bottom: 1.5rem;
        }

        /* Prose styles for post body */
        .prose {
            font-size: 1.1rem;
            line-height: 1.85;
            color: var(--ink);
        }
        .prose p { margin-bottom: 1.5rem; }
        .prose p:last-child { margin-bottom: 0; }

        /* Page transition fade-in */
        main {
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Nav link */
        .nav-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-soft);
            text-decoration: none;
            transition: color 0.1s;
        }
        .nav-link:hover { color: var(--accent); }

        /* HTMX loading indicator */
        .htmx-indicator {
            opacity: 0;
            transition: opacity 0.2s;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- ================================================================
         MASTHEAD — editorial newspaper-style header
    ================================================================ -->
    <header style="background: var(--paper); padding-top: 2rem;">
        <div style="max-width: 860px; margin: 0 auto; padding: 0 1.5rem;">

            <!-- Top bar: date left, nav right -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--ink-muted); letter-spacing: 0.05em;">
                    <!-- Go's time formatting is unique: you use a reference time Mon Jan 2 15:04:05 MST 2006 -->
                    <!-- In templates we can't call time.Now() directly, so we pass it via context or just hardcode the format hint -->
                    est. 2026 &nbsp;·&nbsp; goblog
                </span>
                <nav style="display: flex; gap: 1.5rem; align-items: center;">
                    {{if .User}}
                        <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--ink-muted);">
                            {{.User.Username}}
                        </span>
                        <a href="/dashboard" class="nav-link">Dashboard</a>
                        <a href="/new" class="nav-link">Write</a>
                        <form method="POST" action="/logout" style="margin: 0;">
                            <button type="submit" class="nav-link" style="background:none; border:none; cursor:pointer; padding:0;">
                                Logout
                            </button>
                        </form>
                    {{else}}
                        <a href="/login" class="nav-link">Login</a>
                        <a href="/register" class="nav-link" style="color: var(--ink);">Register</a>
                    {{end}}
                </nav>
            </div>

            <!-- Thick rule -->
            <hr class="masthead-rule">

            <!-- Site name — large typographic treatment -->
            <div style="text-align: center; padding: 1.25rem 0 1rem;">
                <a href="/" style="text-decoration: none;">
                    <h1 style="font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 6vw, 4.5rem); font-weight: 900; color: var(--ink); letter-spacing: -0.02em; margin: 0;">
                        GoBlog
                    </h1>
                </a>
                <p style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-muted); margin: 0.4rem 0 0;">
                    thoughts in go &nbsp;·&nbsp; written by humans
                </p>
            </div>

            <!-- Thin rule -->
            <hr class="masthead-subrule">

        </div>
    </header>

    <!-- ================================================================
         MAIN CONTENT
    ================================================================ -->
    <main style="max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem;">
        {{block "content" .}}{{end}}
    </main>

    <!-- ================================================================
         FOOTER
    ================================================================ -->
    <footer style="border-top: 1px solid var(--rule); padding: 2rem 1.5rem; text-align: center;">
        <p style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--ink-muted); letter-spacing: 0.08em;">
            built with go &nbsp;·&nbsp; rendered server-side &nbsp;·&nbsp; no trackers
        </p>
    </footer>

    <!-- Local HTMX -->
    <script src="/static/js/htmx.min.js"></script>

</body>
</html>
