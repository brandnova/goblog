{{define "content"}}

<div style="max-width:420px; margin:3rem auto 0;">

    <div style="text-align:center; margin-bottom:2.5rem;">
        <h2 style="font-size:2rem; font-weight:900; margin:0 0 0.5rem;">Create an account</h2>
        <p style="color:var(--ink-muted); font-size:0.95rem; margin:0;">
            Join GoBlog and start writing.
        </p>
    </div>

    {{with .Data}}
        {{if .Error}}
        <div class="alert-error">{{.Error}}</div>
        {{end}}
    {{end}}

    <form method="POST" action="/register" style="display:flex; flex-direction:column; gap:1.25rem;">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label style="display:block; font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:0.5rem;">
                Username
            </label>
            <input
                type="text"
                name="username"
                class="field"
                placeholder="yourname"
                value="{{with .Data}}{{.Username}}{{end}}"
                required
                autocomplete="username"
            >
        </div>

        <div>
            <label style="display:block; font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:0.5rem;">
                Email
            </label>
            <input
                type="email"
                name="email"
                class="field"
                placeholder="you@example.com"
                value="{{with .Data}}{{.Email}}{{end}}"
                required
                autocomplete="email"
            >
        </div>

        <div>
            <label style="display:block; font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:0.5rem;">
                Password
            </label>
            <input
                type="password"
                name="password"
                class="field"
                placeholder="Min. 8 characters"
                required
                autocomplete="new-password"
            >
        </div>

        <div>
            <label style="display:block; font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:0.5rem;">
                Confirm Password
            </label>
            <input
                type="password"
                name="confirm_password"
                class="field"
                placeholder="Repeat password"
                required
                autocomplete="new-password"
            >
        </div>

        <button type="submit" class="btn-primary" style="width:100%; text-align:center; margin-top:0.5rem;">
            Create account
        </button>

    </form>

    <p style="text-align:center; margin-top:1.75rem; font-size:0.9rem; color:var(--ink-muted);">
        Already have an account?
        <a href="/login" style="color:var(--ink); text-decoration:underline; text-underline-offset:3px;">
            Sign in
        </a>
    </p>

</div>

{{end}}
