{{define "content"}}

{{with .Data}}

<div style="margin-bottom:2.5rem;">
    <a href="/"
       style="font-family:'JetBrains Mono',monospace; font-size:0.75rem; letter-spacing:0.08em;
              text-transform:uppercase; color:var(--ink-muted); text-decoration:none;
              display:inline-flex; align-items:center; gap:0.4rem; margin-bottom:1.25rem;
              transition:color 0.1s;"
       onmouseover="this.style.color='var(--accent)'"
       onmouseout="this.style.color='var(--ink-muted)'">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        All posts
    </a>

    <div class="section-rule">Tag</div>
    <h1 style="font-family:'Playfair Display',serif; font-size:2.25rem; font-weight:900; margin:0;">
        #{{.TagName}}
    </h1>
    <p style="color:var(--ink-muted); font-family:'JetBrains Mono',monospace;
              font-size:0.72rem; margin-top:0.5rem;">
        {{len .Posts}} post{{if ne (len .Posts) 1}}s{{end}}
    </p>
</div>

{{if .Posts}}
    <div id="post-list">
        {{template "post_list.html" .}}
    </div>
{{else}}
    <div style="text-align:center; padding:4rem 0; color:var(--ink-muted);">
        <p style="font-family:'JetBrains Mono',monospace; font-size:0.8rem;
                  letter-spacing:0.1em; text-transform:uppercase;">
            No posts found for this tag.
        </p>
        <a href="/" style="display:inline-block; margin-top:1rem;" class="btn-ghost">
            Back to home
        </a>
    </div>
{{end}}

{{end}}
{{end}}
